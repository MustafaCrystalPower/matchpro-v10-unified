# Railway Deployment Configuration for MatchPro v10 UNIFIED
# https://docs.railway.app/deploy/configurator

[build]
builder = "nixpacks"
# Run migrations exactly once during deploy, not on every boot
command = "pnpm db:migrate"

[build.nixpacks]
# Node.js environment with required packages
nixPackages = ["nodejs", "pnpm"]

[[build.nixpacks.overlays]]
name = "python"
nixpkgs = "python310"

[[processes]]
# Main API server (runs after migrations complete)
name = "api"
cmd = "node dist/index.js"
numReplicas = 1

# Port configuration
[env]
PORT = "3000"
NODE_ENV = "production"

# Health check (uses simple healthz endpoint, independent of auth)
[healthcheck]
method = "GET"
path = "/api/healthz"
interval = 30
timeout = 10
startPeriod = 30

# Volume mount for database (optional - uses Railway PostgreSQL instead)
# [[volumes]]
# source = "matchpro-db"
# destination = "/data"
# ephemeral = false
