<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />

    <!-- Primary -->
    <title>MatchPro™ — Real Estate Intelligence</title>
    <meta name="description" content="MatchPro Intelligence Engine™ — AI-powered real estate supply & demand matching platform. Real-time Arabic/English matching by Crystal Power Investments." />
    <meta name="application-name" content="MatchPro™" />
    <meta name="author" content="Crystal Power Investments" />
    <meta name="keywords" content="real estate, matching, Egypt, supply demand, broker, PropTech, MatchPro" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme color (Android Chrome + desktop) -->
    <meta name="theme-color" content="#111827" />
    <meta name="msapplication-TileColor" content="#111827" />
    <meta name="msapplication-TileImage" content="/icon-144x144.png" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MatchPro™" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS icons -->
    <link rel="apple-touch-icon" href="/icon-180x180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180x180.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icon-192x192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-96x96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icon-72x72.png" />
    <link rel="shortcut icon" href="/icon-192x192.png" />

    <!-- OG / Social -->
    <meta property="og:title" content="MatchPro™ — Real Estate Intelligence" />
    <meta property="og:description" content="MatchPro Intelligence Engine™ — AI-powered real estate supply & demand matching platform by Crystal Power Investments." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon-512x512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="MatchPro™ — Real Estate Intelligence" />
    <meta name="twitter:description" content="AI-powered real estate matching engine by Crystal Power Investments." />
    <meta name="twitter:image" content="/icon-512x512.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
